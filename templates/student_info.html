{% extends "base.html" %}

{% block page_title %}Student Information{% endblock %}

{% block content %}
<div class="card glass-card fade-up">
    <h2>Student Information</h2>
    <p class="section-intro">Enter the core student details for this assessment session.</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" class="form-grid">
        <div class="form-group full-span">
            <label>Full Name</label>
            <input type="text" name="full_name" value="{{ initial_data.full_name }}" required>
        </div>

        <div class="form-group">
            <label>Matric Number</label>
            <input type="text" name="matric_number" value="{{ initial_data.matric_number }}" required>
        </div>

        <div class="form-group">
            <label>Department</label>
            <input type="text" name="department" required>
        </div>

        <div class="form-group">
            <label>Level</label>
            <input type="text" name="level" required>
        </div>

        <div class="form-group">
            <label>Course Code</label>
            <input type="text" name="course_code" required>
        </div>

        <div class="form-group full-span">
            <label>Course Title</label>
            <input type="text" name="course_title" required>
        </div>

        <div class="form-actions full-span">
            <button type="submit" class="btn">Continue</button>
        </div>
    </form>
</div>
{% endblock %}
