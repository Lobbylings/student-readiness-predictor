{% extends "base.html" %}

{% block page_title %}Readiness Questions{% endblock %}

{% block content %}
<div class="card glass-card fade-up">
    <div class="section">
        <h2>Readiness Questions</h2>
        <p class="muted-text">
            Answer these final self-evaluation questions, then continue to the course material quiz.
        </p>

        <form method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label for="confidence">How confident do you feel about the exam?</label>
                    <select name="confidence" id="confidence" required>
                        <option value="">Select option</option>
                        <option value="low">Low</option>
                        <option value="moderate">Moderate</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="revision">Have you revised the course properly?</label>
                    <select name="revision" id="revision" required>
                        <option value="">Select option</option>
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="past_questions">Have you practiced past questions?</label>
                    <select name="past_questions" id="past_questions" required>
                        <option value="">Select option</option>
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="understanding">How well do you understand the course topics?</label>
                    <select name="understanding" id="understanding" required>
                        <option value="">Select option</option>
                        <option value="poor">Poor</option>
                        <option value="fair">Fair</option>
                        <option value="good">Good</option>
                        <option value="strong">Strong</option>
                    </select>
                </div>
            </div>

            <div class="button-row" style="margin-top: 20px;">
                <button type="submit" class="btn">Continue to Course Material Quiz</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
